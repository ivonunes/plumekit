name = "hello"
main = "worker.mjs"
compatibility_date = "2026-06-01"

# app.wasm is imported by worker.mjs and bundled automatically by wrangler.

# Static files from the app's Public/ directory — `plumekit build` copies them next to
# this file as ./public. Cloudflare serves a matching path (e.g. the content-hashed
# /app.<hash>.css and /app.<hash>.js, your images) directly; every other request runs the Worker. The
# same URLs the native server serves from Public/, served here by the platform.
[assets]
directory = "./public"

# The KV binding the app reaches via `request.context.kv`.
# For `wrangler dev` the id is simulated locally; for `wrangler deploy`, create a
# namespace (`wrangler kv namespace create KV`) and paste its id here.
[[kv_namespaces]]
binding = "KV"
id = "app_kv_local"

# The ephemeral cache the app reaches via `request.context.cache` — a Workers KV
# namespace used as a cache (entries carry a TTL). Remove if the app doesn't cache.
[[kv_namespaces]]
binding = "CACHE"
id = "app_cache_local"

# The SQL database the app reaches via `request.context.database` (Cloudflare D1).
# `wrangler dev` simulates it locally; for deploy, `wrangler d1 create <name>` and
# paste the database_id. Remove this block if the app doesn't use a database.
[[d1_databases]]
binding = "DB"
database_name = "app_db"
database_id = "app_db_local_0000000000000000000000000000"

# The object storage the app reaches via `request.context.storage` (Cloudflare R2).
# `wrangler dev` simulates it locally; for deploy, `wrangler r2 bucket create <name>`.
# Remove this block if the app doesn't use object storage.
[[r2_buckets]]
binding = "BLOB"
bucket_name = "app-blobs"

# Scheduled tasks (buildSchedule()): one every-minute cron drives them all — each
# task's own cadence (hourly, daily, …) is matched inside the app. Uncomment to enable.
# [triggers]
# crons = ["* * * * *"]

# The queue the app reaches via `request.context.queue` (Cloudflare Queues).
# Remove if the app doesn't enqueue.
[[queues.producers]]
binding = "QUEUE"
queue = "app-jobs"

# The consumer side (background jobs): workerd delivers batches to the worker's
# queue() handler, which dispatches each message through the app's JobRegistry.
[[queues.consumers]]
queue = "app-jobs"
max_batch_size = 10
max_batch_timeout = 1

# Real-time channels: a Durable Object per channel id, hosting the wasm guest.
# Remove if the app has no channels.
[[durable_objects.bindings]]
name = "CHANNEL"
class_name = "ChannelDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChannelDO"]

# Plain, non-secret config the app reaches via `request.bindings.secrets`.
[vars]
GREETING = "hello-from-vars"

# Signing keys (CSRF_SECRET, CHANNEL_SIGNING_KEY, AUTH_SECRET) are SECRETS, not vars.
# They are NOT committed here. Set each one before deploying:
#
#   wrangler secret put CSRF_SECRET
#   wrangler secret put CHANNEL_SIGNING_KEY
#   wrangler secret put AUTH_SECRET
#
# For local `wrangler dev`, put development values in `.dev.vars` (gitignored),
# which the scaffold creates for you. Never put real signing keys in [vars] —
# this file is committed.
