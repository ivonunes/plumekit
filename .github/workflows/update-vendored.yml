name: Update vendored dependencies

# Weekly check of the vendored ThirdParty/ upstreams (SQLite, zlib). When one
# has a newer release, support/update-vendored.sh re-vendors it and the diff
# lands as a PR on the fixed `vendored-updates` branch — force-pushed and
# edited in place on later runs, so there is never more than one open PR, and
# closed automatically if main catches up by other means.
#
# The branch is pushed with the release deploy key: deploy-key pushes are real
# push events (GITHUB_TOKEN events are suppressed by GitHub's recursion
# guard), so the PR runs the normal required test.yml checks. The one wrinkle
# is PR creation, which must use GITHUB_TOKEN and so starts no checks — hence
# the amend-and-push nudge right after, whose `synchronize` event does.

on:
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-vendored
  cancel-in-progress: false

jobs:
  check:
    name: Check upstreams
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.apply.outputs.changed }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v7
        with:
          ref: main

      - name: Apply updates
        id: apply
        run: |
          support/update-vendored.sh
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      # If main already carries everything (an update was merged or made by
      # hand), a leftover open PR is stale — close it.
      - name: Close stale PR
        if: steps.apply.outputs.changed == 'false'
        run: |
          PR="$(gh pr list --head vendored-updates --state open --json number --jq '.[0].number' || true)"
          if [ -n "$PR" ]; then
            gh pr close "$PR" --comment "main already carries these updates." --delete-branch
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  pr:
    name: Raise PR
    needs: check
    if: needs.check.outputs.changed == 'true'
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout main
        uses: actions/checkout@v7
        with:
          ref: main
          ssh-key: ${{ secrets.RELEASE_DEPLOY_KEY }}

      - name: Apply updates
        id: apply
        run: |
          {
            echo "summary<<EOF"
            support/update-vendored.sh
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Push branch and create or update PR
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b vendored-updates
          git add -A
          git commit -m "Update vendored dependencies"
          git push --force origin vendored-updates

          {
            echo "Vendored dependency updates found by the weekly check:"
            echo
            echo "$SUMMARY" | sed 's/^/- /'
          } > pr-body.md

          PR="$(gh pr list --head vendored-updates --state open --json number --jq '.[0].number' || true)"
          if [ -n "$PR" ]; then
            gh pr edit "$PR" --body-file pr-body.md
          else
            gh pr create --title "Update vendored dependencies" --body-file pr-body.md --base main --head vendored-updates
            # A PR opened with GITHUB_TOKEN starts no pull_request workflows,
            # so re-push the same content under a new SHA — the deploy-key
            # push fires `synchronize` and the checks run.
            git commit --amend --no-edit
            git push --force origin vendored-updates
          fi
        env:
          GH_TOKEN: ${{ github.token }}
          SUMMARY: ${{ steps.apply.outputs.summary }}
