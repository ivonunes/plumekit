name: AWS (LocalStack)

# The AWS integration check: drives the Hello Lambda against LocalStack (S3 / SQS /
# SSM / DynamoDB) + Postgres. Scoped to AWS changes so it never gates
# unrelated PRs. GitHub-hosted ubuntu runners ship docker + the aws CLI.
on:
  pull_request:
    paths:
      - "Sources/PlumeAWS/**"
      - "Sources/PlumeS3/**"
      - "Sources/PlumePostgres/**"
      - "support/aws-localstack.sh"
      - "support/lambda-mock-runtime.mjs"
      - "Fixtures/Hello/docker-compose.localstack.yml"

jobs:
  localstack:
    name: Hello Lambda × LocalStack
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Runs on the host (not a container) because the script needs the host's docker to
      # boot LocalStack + Postgres, so Swift is installed from the official toolchain
      # tarball rather than a container image or swift-actions/setup-swift (which lags new
      # releases / runs on the deprecated node20).
      - name: Install Swift 6.3.2
        run: |
          curl -fsSL https://download.swift.org/swift-6.3.2-release/ubuntu2404/swift-6.3.2-RELEASE/swift-6.3.2-RELEASE-ubuntu24.04.tar.gz -o /tmp/swift.tar.gz
          sudo mkdir -p /opt/swift
          sudo tar xzf /tmp/swift.tar.gz -C /opt/swift --strip-components=1
          echo "/opt/swift/usr/bin" >> "$GITHUB_PATH"

      - name: Install libpq (PlumePostgres)
        run: sudo apt-get update && sudo apt-get install -y libpq-dev

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      # docker + the aws CLI are preinstalled on ubuntu-latest; the script boots
      # LocalStack + Postgres, provisions resources, and drives the Lambda binary.
      - name: Drive the Hello Lambda against LocalStack
        run: ./support/aws-localstack.sh
