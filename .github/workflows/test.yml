name: Test

on:
  pull_request:

permissions:
  contents: read

jobs:
  linux:
    name: Linux
    runs-on: ubuntu-latest
    container:
      image: swift:6.3
    # A live Postgres so the pooled-driver integration tests run in CI (they
    # skip wherever PLUMEKIT_TEST_POSTGRES_URL is unset).
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Cache SwiftPM build
        uses: actions/cache@v6
        with:
          path: .build
          key: linux-test-swiftpm-${{ hashFiles('Package.swift') }}
          restore-keys: |
            linux-test-swiftpm-

      # libpq for the opt-in Postgres driver (SQLite is vendored in ThirdParty/).
      - name: Install build deps
        run: apt-get update && apt-get install -y libpq-dev

      - name: Test
        run: swift test
        env:
          PLUMEKIT_TEST_POSTGRES_URL: host=postgres port=5432 user=postgres password=postgres dbname=postgres

      - name: Release build
        run: swift build -c release --static-swift-stdlib

      - name: Smoke test CLI
        run: |
          .build/release/plumekit version
          printf '@let title = "Hello"\n<h1>{ title }</h1>\n' > sample.plume
          .build/release/plumekit check sample.plume
          .build/release/plumekit format --stdin < sample.plume > formatted.plume

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: lts/*

      - name: Check editor scripts
        run: |
          node -e 'JSON.parse(require("fs").readFileSync("editors/vscode/package.json", "utf8"))'
          node -e 'JSON.parse(require("fs").readFileSync("editors/vscode/snippets/plume.json", "utf8"))'
          node -e 'JSON.parse(require("fs").readFileSync("editors/vscode/syntaxes/plume.tmLanguage.json", "utf8"))'
          node -e 'JSON.parse(require("fs").readFileSync("editors/nova/Plume.novaextension/extension.json", "utf8"))'
          node -c editors/vscode/extension.js
          node -c editors/nova/Plume.novaextension/Scripts/main.js
          sh -n support/build-nova-extension.sh

  client-runtime:
    name: Client runtime (jsdom)
    runs-on: ubuntu-latest
    container:
      image: swift:6.3
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Cache SwiftPM build
        uses: actions/cache@v6
        with:
          path: .build
          key: linux-client-swiftpm-${{ hashFiles('Package.swift') }}
          restore-keys: |
            linux-client-swiftpm-

      - name: Install build deps
        run: apt-get update && apt-get install -y libpq-dev

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: lts/*

      - name: Install client-runtime test deps (jsdom)
        run: npm install --prefix Tests/ClientRuntime

      - name: Behavioural DOM tests
        run: swift test --filter PlumeClientRuntimeTests

  embedded:
    name: Embedded-Wasm gate + Cloudflare bundle
    runs-on: ubuntu-latest
    container:
      image: swift:6.3.2
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Cache SwiftPM build
        uses: actions/cache@v6
        with:
          path: .build
          key: linux-gate-swiftpm-${{ hashFiles('Package.swift') }}
          restore-keys: |
            linux-gate-swiftpm-

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: lts/*

      - name: Install the Swift SDK for WebAssembly (Embedded)
        run: |
          swift sdk install \
            https://download.swift.org/swift-6.3.2-release/wasm-sdk/swift-6.3.2-RELEASE/swift-6.3.2-RELEASE_wasm.artifactbundle.tar.gz \
            --checksum a61f0584c93283589f8b2f42db05c1f9a182b506c2957271402992655591dd7c

      # binaryen for wasm-opt (the Cloudflare bundle); libpq for the native builds.
      - name: Install build deps
        run: apt-get update && apt-get install -y binaryen libpq-dev

      - name: Embedded-clean check
        run: support/embedded-check.sh

      - name: Embedded-Wasm render gate
        run: support/embedded-gate.sh

      - name: Build the example to a Cloudflare bundle
        run: swift run plumekit build --target cloudflare Fixtures/Hello

  macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # The runner's default Xcode Swift is older than the package's tools-version, so
      # install the matching toolchain from swift.org. It's put on PATH only in the Swift
      # steps below (NOT globally) so it doesn't shadow Xcode's clang for the Nova build's C.
      - name: Install Swift 6.3.2
        run: |
          curl -fsSL https://download.swift.org/swift-6.3.2-release/xcode/swift-6.3.2-RELEASE/swift-6.3.2-RELEASE-osx.pkg -o /tmp/swift.pkg
          sudo installer -pkg /tmp/swift.pkg -target /

      - name: Cache SwiftPM build
        uses: actions/cache@v6
        with:
          path: .build
          key: macos-test-swiftpm-${{ hashFiles('Package.swift') }}
          restore-keys: |
            macos-test-swiftpm-

      - name: Test
        run: |
          export PATH="/Library/Developer/Toolchains/swift-6.3.2-RELEASE.xctoolchain/usr/bin:$PATH"
          swift test

      - name: Release build
        run: |
          export PATH="/Library/Developer/Toolchains/swift-6.3.2-RELEASE.xctoolchain/usr/bin:$PATH"
          swift build -c release

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: lts/*

      - name: Cache Nova download
        uses: actions/cache@v6
        with:
          path: nova-download/Nova.zip
          key: nova-app-zip-v1

      - name: Install Nova
        id: install-nova
        continue-on-error: true
        run: |
          mkdir -p nova-download
          if [ ! -f nova-download/Nova.zip ]; then
            curl --fail -L https://download.panic.com/nova/Nova-Latest.zip -o nova-download/Nova.zip
          fi
          mkdir -p "$RUNNER_TEMP/nova"
          ditto -x -k nova-download/Nova.zip "$RUNNER_TEMP/nova"
          test -d "$RUNNER_TEMP/nova/Nova.app"
          echo "NOVA_APP_PATH=$RUNNER_TEMP/nova/Nova.app" >> "$GITHUB_ENV"

      - name: Build Nova extension
        if: steps.install-nova.outcome == 'success'
        run: support/build-nova-extension.sh

      - name: Smoke test CLI
        run: |
          .build/release/plumekit version
          printf '@let title = "Hello"\n<h1>{ title }</h1>\n' > sample.plume
          .build/release/plumekit check sample.plume
          .build/release/plumekit format --stdin < sample.plume > formatted.plume
